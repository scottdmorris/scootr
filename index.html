<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>scootr's laboratory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --off-white: #e8e4dc;
    --dim: rgba(232, 228, 220, 0.45);
    --dimmer: rgba(232, 228, 220, 0.25);
  }

  html {
    width: 100%;
    height: 100%;
    height: -webkit-fill-available;
    background: #000;
  }

  body {
    width: 100%;
    min-height: 100%;
    min-height: -webkit-fill-available;
    overflow: hidden;
    background: #000;
    cursor: crosshair;
  }

  @media (pointer: coarse) {
    body { cursor: auto; }
  }

  /* VIDEO LAYER */
  #bg-video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 3s ease;
    filter: brightness(0.35) contrast(1.1) saturate(0.6);
    z-index: 0;
    /* prevents mobile video from going fullscreen on tap */
    pointer-events: none;
  }
  #bg-video.loaded { opacity: 1; }

  /* GRAIN OVERLAY */
  #grain {
    position: fixed;
    inset: -50%;
    width: 200%;
    height: 200%;
    z-index: 1;
    pointer-events: none;
    opacity: 0.065;
    animation: grain-shift 0.12s steps(1) infinite;
  }
  @keyframes grain-shift {
    0%   { transform: translate(0, 0); }
    10%  { transform: translate(-3%, -4%); }
    20%  { transform: translate(4%, 2%); }
    30%  { transform: translate(-2%, 5%); }
    40%  { transform: translate(5%, -3%); }
    50%  { transform: translate(-4%, 4%); }
    60%  { transform: translate(3%, -5%); }
    70%  { transform: translate(-5%, 2%); }
    80%  { transform: translate(2%, 4%); }
    90%  { transform: translate(-3%, -2%); }
    100% { transform: translate(4%, -4%); }
  }

  /* VIGNETTE */
  #vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(0,0,0,0.4) 65%,
      rgba(0,0,0,0.85) 100%
    );
  }

  /* CONTENT */
  #content {
    position: fixed;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    padding-bottom: calc(2rem + env(safe-area-inset-bottom));
    text-align: center;
  }

  #site-label {
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--dimmer);
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fade-up 1.2s ease 0.4s forwards;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.8rem, 7vw, 5.5rem);
    color: var(--off-white);
    letter-spacing: 0.06em;
    line-height: 1;
    opacity: 0;
    animation: fade-up 1.4s ease 0.2s forwards;
  }

  h1 em {
    font-style: italic;
    font-weight: 300;
  }

  #tagline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(0.85rem, 2vw, 1.05rem);
    color: var(--dimmer);
    letter-spacing: 0.12em;
    margin-top: 1.2rem;
    opacity: 0;
    animation: fade-up 1.4s ease 0.6s forwards;
  }

  #divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, var(--dimmer), transparent);
    margin: 2.5rem auto;
    opacity: 0;
    animation: fade-up 1s ease 1s forwards;
  }

  #projects {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    opacity: 0;
    animation: fade-up 1.2s ease 1.1s forwards;
  }

  #projects li {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    justify-content: center;
  }

  #projects li::before {
    content: '';
    display: block;
    width: 18px;
    height: 1px;
    background: var(--dimmer);
    flex-shrink: 0;
  }

  #projects a {
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    letter-spacing: 0.28em;
    color: var(--dim);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.3s ease, letter-spacing 0.3s ease;
    position: relative;
  }

  #projects a:hover {
    color: var(--off-white);
    letter-spacing: 0.35em;
  }

  /* coming soon items */
  #projects .soon {
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    letter-spacing: 0.28em;
    color: rgba(232,228,220,0.15);
    text-transform: uppercase;
    cursor: default;
  }

  #projects .soon::after {
    content: ' ·';
    font-size: 9px;
    color: rgba(232,228,220,0.1);
  }

  /* FOOTER */
  #footer {
    position: fixed;
    bottom: calc(2rem + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    opacity: 0;
    animation: fade-up 1s ease 1.6s forwards;
  }

  #footer p {
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(232,228,220,0.15);
    text-transform: uppercase;
    white-space: nowrap;
  }

  #footer a {
    color: rgba(232,228,220,0.25);
    text-decoration: none;
    transition: color 0.3s;
  }

  #footer a:hover {
    color: rgba(232,228,220,0.6);
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* subtle scanlines */
  #scanlines {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }
</style>
</head>
<body>

<!-- looping video — dark moody castle/architecture footage from Pexels (free) -->
<video id="bg-video" autoplay muted loop playsinline
  src="./14227690_1920_1080_30fps.mp4">
</video>

<!-- grain canvas -->
<canvas id="grain"></canvas>

<div id="scanlines"></div>
<div id="vignette"></div>

<main id="content">
  <p id="site-label">Brooklyn, NY</p>

  <h1>scootr's <em>laboratory</em></h1>

  <p id="tagline">experiments</p>

  <div id="divider"></div>

  <ul id="projects">
    <!-- swap hrefs when you have real URLs -->
    <li><a href="#" onclick="return false;">Interview prep cli</a></li>
    <li><a href="#" onclick="return false;">AI jobs dashboard</a></li>
    <li><span class="soon">More incoming</span></li>
  </ul>
</main>

<footer id="footer">
  <p>
    <a href="https://github.com/scottdmorris" target="_blank">github</a>
    &nbsp;·&nbsp;
    <a href="https://linkedin.com" target="_blank">linkedin</a>
    &nbsp;·&nbsp;
    <a href="https://instagram.com/scootr" target="_blank" aria-label="Instagram" style="display:inline-flex;align-items:center;vertical-align:middle;opacity:0.4;transition:opacity 0.3s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='0.4'">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#e8e4dc" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1" fill="#e8e4dc" stroke="none"/>
      </svg>
    </a>
    &nbsp;·&nbsp;
    scootrslaboratory.dev
  </p>
</footer>

<script>
  // fade in video on load
  const vid = document.getElementById('bg-video');
  vid.addEventListener('canplay', () => vid.classList.add('loaded'));
  setTimeout(() => vid.classList.add('loaded'), 2000);

  // generate grain texture on canvas
  const canvas = document.getElementById('grain');
  const ctx = canvas.getContext('2d');

  function resizeGrain() {
    canvas.width = window.innerWidth * 2;
    canvas.height = window.innerHeight * 2;
    drawGrain();
  }

  function drawGrain() {
    const w = canvas.width, h = canvas.height;
    const imageData = ctx.createImageData(w, h);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
      const v = Math.random() * 255;
      data[i] = v;
      data[i+1] = v;
      data[i+2] = v;
      data[i+3] = 255;
    }
    ctx.putImageData(imageData, 0, 0);
  }

  resizeGrain();
  window.addEventListener('resize', resizeGrain);
</script>

</body>
</html>
