<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>scootr's laboratory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

  :root {
    --off-white: #e8e4dc;
    --dim: rgba(232, 228, 220, 0.7);
    --dimmer: rgba(232, 228, 220, 0.6);
  }

  html {
    width: 100%;
    height: 100%;
    height: -webkit-fill-available;
    background: #000;
  }

  *, *::before, *::after {
    cursor: none !important;
  }

  body {
    width: 100%;
    min-height: 100%;
    min-height: -webkit-fill-available;
    overflow: hidden;
    background: #000;
    cursor: none;
  }

  @media (pointer: coarse) {
    body { cursor: auto; }
    #cod { display: none; }
  }

  /* COD CROSSHAIR */
  #cod {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    width: 0; height: 0;
  }
  #cod span {
    position: absolute;
    background: #ffffff;
    transform: translate(-50%, -50%);
    transition: transform 0.08s ease, opacity 0.08s ease;
  }
  #cod .top    { width: 1.5px; height: 8px;  top: -12px; left: 0; }
  #cod .bottom { width: 1.5px; height: 8px;  top:  12px; left: 0; }
  #cod .left   { width: 8px;   height: 1.5px; top: 0; left: -12px; }
  #cod .right  { width: 8px;   height: 1.5px; top: 0; left:  12px; }
  #cod .dot    { width: 3px;   height: 3px; border-radius: 50%; top: 0; left: 0; }

  /* hitmarker flash */
  #cod.hit .top    { transform: translate(-50%, -50%) translateY(-4px); background: rgba(255,220,100,0.95); }
  #cod.hit .bottom { transform: translate(-50%, -50%) translateY(4px);  background: rgba(255,220,100,0.95); }
  #cod.hit .left   { transform: translate(-50%, -50%) translateX(-4px); background: rgba(255,220,100,0.95); }
  #cod.hit .right  { transform: translate(-50%, -50%) translateX(4px);  background: rgba(255,220,100,0.95); }
  #cod.hit .dot    { background: rgba(255,220,100,0.95); transform: translate(-50%,-50%) scale(2); }

  /* VIDEO LAYER */
  #bg-video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 3s ease;
    filter: brightness(0.35) contrast(1.1) saturate(0.6);
    z-index: 0;
    /* prevents mobile video from going fullscreen on tap */
    pointer-events: none;
  }
  #bg-video.loaded { opacity: 1; }

  /* GRAIN OVERLAY */
  #grain {
    position: fixed;
    inset: -50%;
    width: 200%;
    height: 200%;
    z-index: 1;
    pointer-events: none;
    opacity: 0.28;
    mix-blend-mode: overlay;
    animation: grain-shift 0.12s steps(1) infinite;
  }
  @keyframes grain-shift {
    0%   { transform: translate(0, 0); }
    10%  { transform: translate(-3%, -4%); }
    20%  { transform: translate(4%, 2%); }
    30%  { transform: translate(-2%, 5%); }
    40%  { transform: translate(5%, -3%); }
    50%  { transform: translate(-4%, 4%); }
    60%  { transform: translate(3%, -5%); }
    70%  { transform: translate(-5%, 2%); }
    80%  { transform: translate(2%, 4%); }
    90%  { transform: translate(-3%, -2%); }
    100% { transform: translate(4%, -4%); }
  }

  /* VIGNETTE */
  #vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(0,0,0,0.4) 65%,
      rgba(0,0,0,0.85) 100%
    );
  }

  /* CONTENT */
  #content {
    position: fixed;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    padding-bottom: calc(2rem + env(safe-area-inset-bottom));
    text-align: center;
  }

  #site-label {
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--dimmer);
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fade-up 1.2s ease 0.4s forwards;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.8rem, 7vw, 5.5rem);
    color: var(--off-white);
    letter-spacing: 0.06em;
    line-height: 1;
    opacity: 0;
    animation: fade-up 1.4s ease 0.2s forwards;
  }

  h1 em {
    font-style: italic;
    font-weight: 300;
  }

  #tagline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(0.85rem, 2vw, 1.05rem);
    color: var(--dimmer);
    letter-spacing: 0.12em;
    margin-top: 1.2rem;
    opacity: 0;
    animation: fade-up 1.4s ease 0.6s forwards;
  }

  #divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, var(--dimmer), transparent);
    margin: 2.5rem auto;
    opacity: 0;
    animation: fade-up 1s ease 1s forwards;
  }

  #projects {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    opacity: 0;
    animation: fade-up 1.2s ease 1.1s forwards;
  }

  #projects li {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    justify-content: center;
  }

  #projects li::before {
    content: '';
    display: block;
    width: 18px;
    height: 1px;
    background: var(--dimmer);
    flex-shrink: 0;
  }

  #projects a {
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    letter-spacing: 0.28em;
    color: var(--dim);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.3s ease, letter-spacing 0.3s ease;
    position: relative;
  }

  #projects a:hover {
    color: var(--off-white);
    letter-spacing: 0.35em;
  }

  /* coming soon items */
  #projects .soon {
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    letter-spacing: 0.28em;
    color: var(--dimmer);
    text-transform: uppercase;
    cursor: none;
  }

  #projects .soon::after {
    content: ' ·';
    font-size: 9px;
    color: rgba(232,228,220,0.25);
  }

  #countdown {
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--dim);
    margin-top: 0.6rem;
    text-align: center;
  }

  /* FOOTER */
  #footer {
    position: fixed;
    bottom: calc(2rem + env(safe-area-inset-bottom));
    right: 2rem;
    z-index: 3;
    opacity: 0;
    animation: fade-up 1s ease 1.6s forwards;
  }

  #footer p {
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(232,228,220,0.15);
    text-transform: uppercase;
    white-space: nowrap;
  }

  #footer a {
    color: rgba(232,228,220,0.25);
    text-decoration: none;
    transition: color 0.3s;
  }

  #footer a:hover {
    color: rgba(232,228,220,0.6);
  }


  @keyframes fade-up {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }


/* subtle scanlines */
  #scanlines {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }
</style>
</head>
<body>

<!-- looping video — dark moody castle/architecture footage from Pexels (free) -->
<video id="bg-video" autoplay muted loop playsinline
  src="./earth-loop.mp4">
</video>

<!-- grain canvas -->
<canvas id="grain"></canvas>

<div id="cod">
  <span class="top"></span>
  <span class="bottom"></span>
  <span class="left"></span>
  <span class="right"></span>
  <span class="dot"></span>
</div>
<div id="scanlines"></div>
<div id="vignette"></div>

<main id="content">
  <p id="site-label">Brooklyn, NY</p>

  <h1>scootr's <em>laboratory</em></h1>

  <p id="tagline">experiments</p>

  <div id="divider"></div>

  <ul id="projects">
    <li><a href="./projects/index.html">Projects</a></li>
    <li><a href="./elysium/index.html">Elysium</a></li>
    <li><a href="./about/index.html">About</a></li>
    <li><a href="./signal/index.html">Signal</a></li>
  </ul>
  <p id="countdown"></p>
</main>

<footer id="footer">
  <p>
    <a href="https://github.com/scottdmorris" target="_blank" aria-label="GitHub" style="display:inline-flex;align-items:center;vertical-align:middle;opacity:0.4;transition:opacity 0.3s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='0.4'">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="#e8e4dc">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
    </a>
    &nbsp;·&nbsp;
    <a href="https://instagram.com/scootr" target="_blank" aria-label="Instagram" style="display:inline-flex;align-items:center;vertical-align:middle;opacity:0.4;transition:opacity 0.3s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='0.4'">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#e8e4dc" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1" fill="#e8e4dc" stroke="none"/>
      </svg>
    </a>
  </p>
</footer>

<script>
  // random flicker — fires every 20-45s, never on a clock
  function doFlicker() {
    const frames = [
      'brightness(2) saturate(3) hue-rotate(20deg)',
      'brightness(0.3) saturate(0) hue-rotate(-20deg)',
      'brightness(2.5) saturate(4) hue-rotate(30deg)',
      'brightness(0.2) saturate(0)',
      'brightness(1.8) saturate(3) hue-rotate(-15deg)',
      'none',
      'brightness(0.3) saturate(0)',
      'brightness(2) saturate(2) hue-rotate(10deg)',
      'none',
    ];
    let i = 0;
    const interval = setInterval(() => {
      document.body.style.filter = frames[i++];
      if (i >= frames.length) { clearInterval(interval); document.body.style.filter = ''; }
    }, 80);
    setTimeout(doFlicker, 5000 + Math.random() * 4000);
  }
  // first fire: wait until video is on the blue side (~3-4s)
  function waitForBlue() {
    const t = document.getElementById('bg-video').currentTime;
    if (t >= 3 && t <= 4.5) { doFlicker(); }
    else { requestAnimationFrame(waitForBlue); }
  }
  requestAnimationFrame(waitForBlue);


  // fade in video on load
  const vid = document.getElementById('bg-video');
  vid.addEventListener('canplay', () => { vid.classList.add('loaded'); vid.playbackRate = 0.88; });
  setTimeout(() => vid.classList.add('loaded'), 2000);

  // COD crosshair
  const cod = document.getElementById('cod');
  window.addEventListener('mousemove', (e) => {
    cod.style.left = e.clientX + 'px';
    cod.style.top = e.clientY + 'px';
  });

  // hitmarker sound
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  let hitBuffer = null;
  fetch('./Hitmarker sound - Sound Effect.mp3')
    .then(r => r.arrayBuffer())
    .then(buf => audioCtx.decodeAudioData(buf))
    .then(decoded => { hitBuffer = decoded; });

  function playHitmarker() {
    if (!hitBuffer) return;
    const source = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    source.buffer = hitBuffer;
    source.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    source.start(audioCtx.currentTime, 0);
    source.stop(audioCtx.currentTime + 0.5);
  }

  window.addEventListener('click', () => {
    playHitmarker();
    cod.classList.add('hit');
    setTimeout(() => cod.classList.remove('hit'), 150);
  });

  // generate grain texture on canvas
  const canvas = document.getElementById('grain');
  const ctx = canvas.getContext('2d');

  function resizeGrain() {
    canvas.width = window.innerWidth * 2;
    canvas.height = window.innerHeight * 2;
    drawGrain();
  }

  function drawGrain() {
    const w = canvas.width, h = canvas.height;
    const imageData = ctx.createImageData(w, h);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
      const v = Math.random() > 0.5 ? 255 : 0;
      data[i] = v;
      data[i+1] = v;
      data[i+2] = v;
      data[i+3] = 255;
    }
    ctx.putImageData(imageData, 0, 0);
  }

  resizeGrain();
  window.addEventListener('resize', resizeGrain);

  // countdown to 2026-05-29
  const target = new Date('2026-09-01T00:00:00-05:00');
  const countdownEl = document.getElementById('countdown');
  function updateCountdown() {
    const diff = target - Date.now();
    if (diff <= 0) { countdownEl.textContent = '00:00:00:00'; return; }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    countdownEl.textContent = `${String(h).padStart(3,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
