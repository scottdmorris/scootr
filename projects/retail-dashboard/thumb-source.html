<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1240px; height: 800px; overflow: hidden; background: #06070b; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.55;
  }
  .glow.a { width: 520px; height: 520px; background: #7c6bf5; top: -180px; left: -140px; }
  .glow.b { width: 460px; height: 460px; background: #2dd4bf; bottom: -200px; right: -100px; opacity: 0.35; }
  .glow.c { width: 380px; height: 380px; background: #fb7244; bottom: -160px; left: 280px; opacity: 0.28; }

  .stage {
    position: relative;
    width: 1240px;
    height: 800px;
    perspective: 1800px;
  }

  .card {
    position: absolute;
    width: 920px;
    border-radius: 22px;
    background: linear-gradient(160deg, #14151f 0%, #0d0e15 100%);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 60px 120px -40px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04) inset;
    padding: 36px 40px;
  }

  .card.back {
    top: 150px;
    left: 230px;
    transform: rotateX(8deg) rotateY(-7deg) translateZ(-60px) scale(0.94);
    opacity: 0.55;
    filter: blur(1px) brightness(0.7);
  }

  .card.front {
    top: 95px;
    left: 160px;
    transform: rotateX(7deg) rotateY(-6deg);
    z-index: 2;
  }

  .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 26px; }
  .brandmark { display: flex; align-items: center; gap: 14px; }
  .dot3 { display: flex; gap: 6px; }
  .dot3 span { width: 9px; height: 9px; border-radius: 50%; display: block; }
  .title { color: #f1f2f8; font-weight: 700; font-size: 19px; letter-spacing: -0.01em; }
  .subtitle { color: #6f7187; font-size: 12.5px; margin-top: 3px; }
  .pillgroup { display: flex; gap: 8px; }
  .pill { background: #1c1e2a; border-radius: 7px; padding: 7px 14px; font-size: 11.5px; color: #8b8da0; }
  .pill.active { background: #fff; color: #111; font-weight: 600; }

  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .metric {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 18px 20px;
  }
  .mlabel { font-size: 10.5px; letter-spacing: 0.07em; text-transform: uppercase; color: #6f7187; margin-bottom: 10px; }
  .mval { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 600; color: #f1f2f8; }
  .mdelta { font-size: 12px; margin-top: 8px; font-weight: 600; }
  .mdelta.up { color: #3ddc97; }
  .mdelta.down { color: #f06464; }

  .panels { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
  .panel {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 20px 22px;
  }
  .panel h4 { color: #c7c9d6; font-size: 13px; font-weight: 600; margin-bottom: 14px; }

  .barlist { display: flex; flex-direction: column; gap: 12px; }
  .barrow { display: flex; align-items: center; gap: 10px; }
  .barname { width: 86px; font-size: 11px; color: #8b8da0; flex-shrink: 0; }
  .bartrack { flex: 1; height: 9px; background: #1c1e2a; border-radius: 5px; overflow: hidden; }
  .barfill { height: 100%; border-radius: 5px; }

  .glowtag {
    position: absolute;
    top: 40px;
    left: 60px;
    z-index: 3;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="glow a"></div>
<div class="glow b"></div>
<div class="glow c"></div>

<div class="stage">
  <div class="card back">
    <div class="row">
      <div class="brandmark">
        <div class="dot3"><span style="background:#fb7244"></span><span style="background:#2dd4bf"></span><span style="background:#8b80f9"></span></div>
        <div><div class="title">Driftcare</div></div>
      </div>
    </div>
  </div>

  <div class="card front">
    <div class="row">
      <div class="brandmark">
        <div class="dot3"><span style="background:#8b80f9"></span></div>
        <div>
          <div class="title">Northbound &mdash; Weekly Sales</div>
          <div class="subtitle">Week of Jun 21 &ndash; Jun 25, 2026</div>
        </div>
      </div>
      <div class="pillgroup">
        <div class="pill active">Weekly</div>
        <div class="pill">Monthly</div>
      </div>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="mlabel">Net Revenue</div>
        <div class="mval">$9.6k</div>
        <div class="mdelta up">&uarr; 7.9%</div>
      </div>
      <div class="metric">
        <div class="mlabel">Orders</div>
        <div class="mval">141</div>
        <div class="mdelta down">&darr; 1.7%</div>
      </div>
      <div class="metric">
        <div class="mlabel">AOV</div>
        <div class="mval">$68.39</div>
        <div class="mdelta up">&uarr; 3.2%</div>
      </div>
      <div class="metric">
        <div class="mlabel">Returning</div>
        <div class="mval">33.3%</div>
        <div class="mdelta up">&uarr; 2.1%</div>
      </div>
    </div>

    <div class="panels">
      <div class="panel">
        <h4>Net revenue &mdash; all weeks</h4>
        <svg width="100%" height="170" viewBox="0 0 540 170">
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#8b80f9" stop-opacity="0.55" />
              <stop offset="100%" stop-color="#8b80f9" stop-opacity="0" />
            </linearGradient>
          </defs>
          <line x1="0" y1="40" x2="540" y2="40" stroke="rgba(255,255,255,0.06)" />
          <line x1="0" y1="90" x2="540" y2="90" stroke="rgba(255,255,255,0.06)" />
          <line x1="0" y1="140" x2="540" y2="140" stroke="rgba(255,255,255,0.06)" />
          <path d="M0,120 L100,95 L200,135 L300,55 L400,40 L540,65 L540,170 L0,170 Z" fill="url(#g1)" />
          <path d="M0,120 L100,95 L200,135 L300,55 L400,40 L540,65" fill="none" stroke="#a89bff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="400" cy="40" r="6" fill="#a89bff" />
        </svg>
      </div>
      <div class="panel">
        <h4>Top products</h4>
        <div class="barlist">
          <div class="barrow"><span class="barname">Diffuser</span><div class="bartrack"><div class="barfill" style="width:92%;background:#8b80f9;"></div></div></div>
          <div class="barrow"><span class="barname">Candle</span><div class="bartrack"><div class="barfill" style="width:74%;background:#8b80f9;"></div></div></div>
          <div class="barrow"><span class="barname">Travel Tin</span><div class="bartrack"><div class="barfill" style="width:46%;background:#8b80f9;"></div></div></div>
          <div class="barrow"><span class="barname">Room Spray</span><div class="bartrack"><div class="barfill" style="width:30%;background:#8b80f9;"></div></div></div>
          <div class="barrow"><span class="barname">Starter Set</span><div class="bartrack"><div class="barfill" style="width:22%;background:#8b80f9;"></div></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
